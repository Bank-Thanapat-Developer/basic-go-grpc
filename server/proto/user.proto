syntax = "proto3";

// package ของ Go ที่ generated code จะถูกใส่ลงไป
// เก็บไว้ที่เดียวกับ helloworld.pb.go เพื่อให้ import จาก client/server ได้ง่าย
option go_package = "grpc-hello-world/tutorialpb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ─────────────────────────────────────────────────────────────────────
// UserService — service ใหม่ที่สาธิต data types หลากหลายของ Protobuf
// + การ handle error แบบ rich (errdetails.BadRequest)
// ─────────────────────────────────────────────────────────────────────
service UserService {
    // CreateUser สร้าง user ใหม่ — validate input ก่อน
    // ถ้า invalid จะ return InvalidArgument พร้อม BadRequest details
    rpc CreateUser(CreateUserRequest) returns (User);

    // GetUser ดึง user ตาม id — ถ้าไม่เจอ return NotFound
    rpc GetUser(GetUserRequest) returns (User);

    // ListUsers คืนรายการ user ทั้งหมด (รองรับ filter ตาม role)
    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

    // DeleteUser ลบ user — return google.protobuf.Empty
    // (วิธีปกติเวลาไม่มีอะไรต้องคืน)
    rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
}

// Role คือ enum สาธิตการใช้ enumeration ใน proto
// ตามมาตรฐาน Google: enum แรก (= 0) ควรลงท้ายด้วย _UNSPECIFIED
enum Role {
    ROLE_UNSPECIFIED = 0; // ค่า default — ใช้บอกว่ายังไม่ระบุ
    ROLE_ADMIN       = 1; // ผู้ดูแลระบบ
    ROLE_USER        = 2; // user ทั่วไป
    ROLE_GUEST       = 3; // guest (read-only)
}

// User คือ message หลักที่รวม data type หลายแบบ
//  - string, int32, bool                  (scalar types)
//  - repeated string                      (list)
//  - map<string, string>                  (key-value)
//  - google.protobuf.Timestamp            (well-known type)
//  - enum Role                            (enumeration)
message User {
    string id                              = 1; // unique id (uuid-like)
    string name                            = 2; // ชื่อ
    string email                           = 3; // email
    int32  age                             = 4; // อายุ
    bool   is_active                       = 5; // status active หรือไม่
    Role   role                            = 6; // role ของ user
    repeated string tags                   = 7; // tag list (เช่น ["vip","beta"])
    map<string, string> metadata           = 8; // custom metadata
    google.protobuf.Timestamp created_at   = 9; // เวลาที่สร้าง
}

// ─────────────────────────────────────────────────────────────────────
// Request / Response messages
// ─────────────────────────────────────────────────────────────────────

message CreateUserRequest {
    string name                  = 1;
    string email                 = 2;
    int32  age                   = 3;
    Role   role                  = 4;
    repeated string tags         = 5;
    map<string, string> metadata = 6;
}

message GetUserRequest {
    string id = 1;
}

message ListUsersRequest {
    // ถ้าใส่ role_filter จะคืนเฉพาะ user ที่ role ตรงกัน
    // ถ้าเป็น ROLE_UNSPECIFIED = ไม่ filter (คืนทั้งหมด)
    Role role_filter = 1;
}

message ListUsersResponse {
    repeated User users = 1;
    int32 total         = 2;
}

message DeleteUserRequest {
    string id = 1;
}
